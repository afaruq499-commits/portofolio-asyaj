<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih | Asyaj Syifa Al Faruq</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thanks-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-color: #f9fafb;
            color: #111827;
        }

        .thanks-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            padding: 4rem 3rem;
            border-radius: 24px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2.5rem;
        }

        .success-icon {
            width: 100%;
            height: 100%;
            background: #f0fdf4;
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        .success-pulse {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #22c55e;
            border-radius: 50%;
            opacity: 0.1;
            animation: pulse 2s infinite;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .thanks-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1.2rem;
            color: #111827;
        }

        .thanks-desc {
            color: #4b5563;
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 3rem;
        }

        .btn-back-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background: #111827;
            color: white !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back-home:hover {
            background: #374151;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 640px) {
            .thanks-card { padding: 3rem 2rem; }
            .thanks-title { font-size: 2.2rem; }
            .thanks-desc { font-size: 1rem; }
        }
    </style>
</head>

<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    <div class="glow-bg"></div>

    <div class="thanks-container">
        <div class="thanks-card">
            <div class="success-icon-wrapper">
                <div class="success-pulse"></div>
                <div class="success-icon">
                    <i data-lucide="check" size="48" stroke-width="3"></i>
                </div>
            </div>
            <h1 class="thanks-title">Pesan Terkirim!</h1>
            <p class="thanks-desc">Terima kasih telah menghubungi saya. Pesan Anda telah berhasil dikirim ke email saya. Saya akan segera membalasnya.</p>
            <a href="index.html" class="btn-back-home">
                <i data-lucide="home" size="20"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('scrollProgress').style.width = '100%';
    </script>
</body>

</html>
